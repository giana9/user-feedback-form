<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>User Feedback Form</h1>

    <form id="feedback-form">
        <label>Username:</label>
        <input type="text" id="username" data-tooltip="Enter your username">

        <label>Email:</label>
        <input type="email" id="email" data-tooltip="Enter your email">

        <label>Comments:</label>
        <textarea id="comments" data-tooltip="List your feedback"></textarea>
        <p id="char-count">0 characters</p>

        <button type="submit">Submit!</button>
    </form>

    <div id="feedback-display"></div>

    <script src="cp_1.js"></script>
</body>
</html>
